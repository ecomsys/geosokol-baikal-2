<!-- Попап -->
<div id="popup" class="fixed inset-0 z-50 hidden">
  <!-- Затемнение (клик по нему закрывает попап) -->
  <div
    class="absolute inset-0 bg-black/50 backdrop-blur-sm"
    onclick="document.getElementById('popup').classList.add('hidden')"
  ></div>

  <!-- Сам попап (поверх оверлея) -->
  <div
    class="relative flex items-center justify-center min-h-screen p-4 pointer-events-none"
  >
    <div
      class="relative w-full max-w-[31.25rem] rounded-[2.5rem] overflow-hidden shadow-2xl pointer-events-auto"
    >
      <!-- Фоновое изображение -->
      <div
        class="absolute inset-0 z-0 bg-cover bg-center"
        style="
          background-image: url(&quot;/public/images/webp/bg-popup.webp&quot;);
        "
      ></div>

      <!-- Затемнение фона для читаемости текста -->
      <div class="absolute inset-0 -z-10 bg-black/40"></div>

      <!-- Кнопка закрытия (крестик) -->
      <button
        onclick="document.getElementById('popup').classList.add('hidden')"
        class="absolute top-3 right-3 z-20 w-10 h-10 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-sm hover:bg-white/20 transition-all duration-300 hover:scale-110 active:scale-90 group"
      >
        <svg
          class="w-5 h-5 text-white transition-all duration-300 group-hover:rotate-90"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.5"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>

      <!-- Контент попапа -->
      <div class="relative z-1 py-12 xl:py-16 px-5 xl:px-24">
        <!-- Заголовок -->
        <h2
          class="text-[1.625rem] xl:text-[1.875rem] leading-[0.86] font-bold text-white text-center mb-12"
        >
          Оставьте заявку
        </h2>

        <!-- Форма -->
        <form id="popupForm" class="space-y-6">
          <!-- Поле "Имя" -->
          <div
            class="relative rounded-[0.75rem] h-[3.75rem] xl:h-[4.5rem] flex items-center"
            style="
              backdrop-filter: blur(0.6109rem);
              background: linear-gradient(90deg, #000 0%, #5b6997 100%);
            "
          >
            <div
              class="absolute left-4 top-1/2 -translate-y-1/2 text-white text-lg"
            >
              <svg class="w-5 h-5 text-white">
                <use href="/icons/sprite/sprite.svg#user"></use>
              </svg>
            </div>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Имя"
              required
              class="w-full pl-12 pr-4 text-[1rem] xl:text-[1.0625rem] text-white placeholder-white/60 focus:outline-none focus:border-transparent transition bg-transparent"
            />
          </div>

          <!-- Поле "Телефон" -->
          <div
            class="relative rounded-[0.75rem] h-[3.75rem] xl:h-[4.5rem] flex items-center"
            style="
              backdrop-filter: blur(0.6109rem);
              background: linear-gradient(90deg, #000 0%, #5b6997 100%);
            "
          >
            <div
              class="absolute left-4 top-1/2 -translate-y-1/2 text-white text-lg"
            >
              <svg class="w-5 h-5 text-white">
                <use href="/icons/sprite/sprite.svg#phone"></use>
              </svg>
            </div>
            <input
              type="tel"
              name="tel"
              id="phone"
              placeholder="Номер телефона"
              required
              class="w-full pl-12 pr-4 text-[1rem] xl:text-[1.0625rem] text-white placeholder-white/60 focus:outline-none focus:border-transparent transition bg-transparent tracking-wider"
            />
          </div>

          <!-- Кнопка отправки -->
          <button
            type="submit"
            class="mt-6 rounded-full h-[3.75rem] xl:h-[4.5rem] w-full mx-auto transition-all duration-300 hover:scale-[1.02] active:scale-95 active:duration-100 group relative"
          >
            <div
              class="relative w-full h-full flex items-center justify-center rounded-full bg-siniy text-white text-[1.375rem] xl:text-[1.5rem] font-medium transition-all duration-300 hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-500/30 active:shadow-inner active:bg-blue-800 overflow-hidden"
            >
              <!-- Фоновое изображение -->
              <div
                class="absolute inset-0 z-0 rounded-full bg-cover bg-center transition-all duration-500 group-hover:scale-110"
                style="
                  background-image: url(&quot;/public/images/webp/popup-button-bg.webp&quot;);
                "
              ></div>

              <span
                class="relative z-10 transition-all duration-300 hover:tracking-wider"
              >
                Отправить
              </span>
            </div>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Подключаем IMask из CDN -->
<script src="https://unpkg.com/imask@6.4.3/dist/imask.min.js"></script>

<script>
  const phoneInput = document.getElementById('phone');
  let maskInstance = null;
  let isMaskActive = false;

  // Функция для активации маски
  function activateMask() {
    if (!maskInstance) {
      maskInstance = IMask(phoneInput, {
        mask: '+{7} (000) 000-00-00',
        placeholderChar: '_',
        lazy: false
      });
    }
    isMaskActive = true;
    phoneInput.placeholder = '';
  }

  // Функция для деактивации маски
  function deactivateMask() {
    if (maskInstance) {
      maskInstance.destroy();
      maskInstance = null;
    }
    isMaskActive = false;
    phoneInput.value = '';
    phoneInput.placeholder = 'Номер телефона';
  }

  // Обработка ввода - основной обработчик
  phoneInput.addEventListener('input', function(e) {
    const currentValue = this.value;
    
    // Если поле пустое - деактивируем маску
    if (currentValue === '') {
      if (isMaskActive) {
        deactivateMask();
      }
      return;
    }

    // Если маска не активна и есть символы - активируем
    if (!isMaskActive && currentValue.length > 0) {
      // Запоминаем первый символ
      const firstChar = currentValue.charAt(0);
      
      // Активируем маску
      activateMask();
      
      // Устанавливаем значение через IMask
      if (maskInstance) {
        maskInstance.value = firstChar;
      }
      return;
    }

    // Если маска активна - просто даем IMask делать свою работу
    // Ничего не делаем, IMask сам обработает ввод
  });

  // Обработка фокуса
  phoneInput.addEventListener('focus', function() {
    if (this.value === '' && !isMaskActive) {
      this.placeholder = 'Номер телефона';
    }
  });

  // Обработка потери фокуса
  phoneInput.addEventListener('blur', function() {
    const value = this.value;
    // Если поле пустое или содержит только маску с подчеркиваниями
    if (value === '' || value === '+7 (___) ___-__-__') {
      deactivateMask();
    }
  });

  // Обработка клавиши Backspace/Delete
  phoneInput.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' || e.key === 'Delete') {
      // Даем событию обработаться, потом проверяем
      setTimeout(() => {
        const value = this.value;
        if (value === '' || value === '+7 (___) ___-__-__') {
          deactivateMask();
        }
      }, 0);
    }
  });

  // Обработка отправки формы
  document.getElementById("popupForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    if (name && phone) {
      alert(`Спасибо, ${name}! Мы скоро свяжемся с вами по номеру ${phone}`);
      document.getElementById("popup").classList.add("hidden");
      this.reset();
      deactivateMask();
    }
  });

  // Обработка клика по оверлею для закрытия
  document.querySelector('#popup .absolute.inset-0.bg-black\\/50').addEventListener('click', function() {
    document.getElementById('popup').classList.add('hidden');
  });
</script>
