<!doctype html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    {{> layout/head}}
  </head>

  <body class="relative min-h-screen bg-[#ECEDEF]">
    <!-- Фоновое изображение на весь экран -->
    <div class="fixed inset-0 -z-10 min-h-[42.5rem]">
      <picture>
        <!-- Десктоп: md и выше (≥40rem) -->
        <source
          media="(min-width: 40rem)"
          srcset="/public/images/webp/new-bg-desktop.webp"
          type="image/webp"
        />
        <!-- Мобильная версия: по умолчанию -->
        <img
          class="w-full h-full object-cover object-top"
          src="/public/images/webp/new-bg-mobile.webp"
          alt="bg"
          fetchpriority="high"
        />
      </picture>
    </div>

    <!-- Контент поверх фона -->
    <div class="relative min-h-[100dvh] overflow-hidden">
      <!-- info tile-->
      <div class="absolute bottom-3 left-3 max-w-[11.5rem] text-[#bababa]">
        <svg class="w-5 h-5">
          <use href="/icons/sprite/sprite.svg#info"></use>
        </svg>
        <p class="mt-1 text-[0.4rem]">
          Представленные товары и комплектующие для БПЛА имеют исключительно
          бытовое назначение. Не являются оружием.
        </p>
      </div>

      <div
        class="flex flex-col mx-auto min-w-[18.75rem] max-w-[56.25rem] px-[0.625rem] py-[0.3125rem] relative z-10"
      >
        {{> layout/header}} {{> sections/main}}
      </div>
    </div>
    {{> layout/footer-scripts}}
  </body>
</html>
