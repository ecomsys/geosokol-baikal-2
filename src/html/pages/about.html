<!doctype html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    {{> layout/head}}
  </head>

  <body class="fixed inset-0 min-h-[100dvh] bg-[#ECEDEF]">
    <!-- top blue part -->
    <div class="scroll-container ">
      <div class="xl:h-screen xl:h-[100dvh] about-top relative bg-[#1a2446]">
        <!-- Фоновое изображение на весь экран -->
        <div class="absolute bottom-0 left-0 right-0 z-5">
          <picture>
            <!-- Десктоп: md и выше (≥40rem) -->
            <source
              media="(min-width: 40rem)"
              srcset="/public/images/webp/top-about-bg.webp"
              type="image/webp"
            />
            <!-- Мобильная версия: по умолчанию -->
            <img
              class="mx-auto w-auto h-[100dvh] object-cover object-bottom"
              src="/public/images/webp/top-about-bg.webp"
              alt="bg"
              fetchpriority="high"
            />
          </picture>
        </div>

        <!-- Контент поверх фона -->
        <div
          class="flex flex-col mx-auto min-w-[18.75rem] max-w-[64.25rem] px-[0.625rem] py-[0.3125rem] relative z-10"
        >
          {{> layout/header-about}} {{> sections/about-top}}
        </div>
      </div>

      <!-- bottom blue part -->
      {{> sections/about-bottom}} {{> layout/footer}}
    </div>
    {{> layout/footer-scripts}}

    <script>
      // Анимация при скролле
      document.addEventListener("DOMContentLoaded", function () {
        const animateElements = document.querySelectorAll(".scroll-animate");

        // Используем Intersection Observer для лучшей производительности
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                // Добавляем класс visible когда элемент появляется в зоне видимости
                entry.target.classList.add("visible");
              }
            });
          },
          {
            threshold: 0.1, // Срабатывает когда 10% элемента видно
            rootMargin: "0px 0px -25px 0px", // Немного смещаем точку срабатывания
          },
        );

        // Наблюдаем за каждым элементом
        animateElements.forEach((el) => observer.observe(el));

        // Для элементов, которые уже видны при загрузке
        setTimeout(() => {
          animateElements.forEach((el) => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight) {
              el.classList.add("visible");
            }
          });
        }, 100);
      });
    </script>
  </body>
</html>
