<!doctype html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    {{> layout/head}}
  </head>

  <body class="fixed inset-0 bg-[#ECEDEF] overflow-hidden">
    <!-- Фоновое изображение на весь экран -->
    <div class="absolute inset-0 -z-10">
      <picture>
        <!-- Десктоп: md и выше (≥40rem) -->
        <source
          media="(min-width: 40rem)"
          srcset="/public/images/webp/bg-desk-contacts.webp"
          type="image/webp"
        />
        <!-- Мобильная версия: по умолчанию -->
        <img
          class="w-full h-auto object-cover object-bottom-right"
          src="/public/images/webp/bg-mobile-contacts.webp"
          alt="bg"
          fetchpriority="high"
        />
      </picture>
    </div>

    <div class="relative h-[100dvh] h-[100svh] overflow-y-auto">
      <!-- Контент поверх фона -->
      <div
        class="flex flex-col mx-auto min-w-[18.75rem] max-w-[56.25rem] px-[0.625rem] py-[0.3125rem] relative z-10"
      >
        {{> layout/header}} {{> sections/contacts}}
      </div>
    </div>
    {{> layout/footer-scripts}}
  </body>
</html>
