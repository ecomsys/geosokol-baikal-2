<style>
  .desk-menu li a {
    position: relative;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s ease, -webkit-text-stroke 0.2s ease;
    color: inherit;
    -webkit-text-stroke: 0rem transparent; /* базовое состояние */
  }

  /* Активная ссылка — жирная 700 */
  .desk-menu li a.active {
    font-weight: 700;
    color: var(--white);
    -webkit-text-stroke: 0rem transparent; /* убираем обводку у активной */
  }

  /* ХОВЕР — обводка (жирный, без прыжков) */
  .desk-menu li a:not(.active):hover {
    color: var(--white);
    -webkit-text-stroke: 0.0938rem currentColor;
    text-shadow: none;
  }

  /* Активная при ховере — ничего не меняем */
  .desk-menu li a.active:hover {
    -webkit-text-stroke: 0rem transparent;
    text-shadow: none;
  }
</style>

  <!-- tel button -->

      <rect
        class="line line-top"

  </button>

    >

        width="21"
        height="21"
        viewBox="0 0 21 21"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect

          width="25"
          height="3"

          transform="rotate(45 2.92871 0.636719)"

  <!-- Меню (скроллится если не помещается) -->

      />

    <div class="min-h-full flex items-center justify-center px-4">
      <ul
        class="mobile-menu flex flex-col items-center gap-6 text-white text-2xl font-monts w-full max-w-sm pb-4"
      >
        <li class="w-full text-center">

        </li>
        <li class="w-full text-center">

        </li>
        <li class="w-full text-center">
          <a href="purchase.html" class="block">Закупка по вашему списку</a>

        <li class="pt-4 w-full flex justify-center">
          <a
            href="tel:+77777777777"

          >
            <span class="px-3 text-white text-[1rem] text-nowrap"
              >+7 777 777 7777</span
            >
            <span
              class="bg-[#1a2446] aspect-square h-full rounded-full flex items-center justify-center"

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const currentUrl = window.location.href;

    document.querySelectorAll(".desk-menu a").forEach((link) => {
      // Если href ссылки совпадает с текущим URL
      if (link.href === currentUrl) {
        link.classList.add("active");
      }
      // Или если ссылка содержит текущий путь
      else if (link.getAttribute("href") === window.location.pathname) {
        link.classList.add("active");
      }
    });
  });
</script>
